name: Stable AI System

on:
  push:
  issues:
    types: [opened]

jobs:
  run-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug repo files
        run: ls -R

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm init -y
          npm install axios

      - name: Check orchestrator
        run: |
          if [ ! -f orchestrator.js ]; then
            echo "❌ orchestrator.js missing"
            exit 1
          fi

      - name: Run AI system
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node orchestrator.js
