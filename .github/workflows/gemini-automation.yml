name: Gemini AI Automation

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  gemini-job:
    runs-on: ubuntu-latest

    steps:
      - name: Run Gemini CLI
        uses: google-gemini/run-gemini-cli@v1
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
